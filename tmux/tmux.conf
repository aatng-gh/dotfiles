# Prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind a last-window

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Mouse support
set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 10
set -g focus-events on
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 1500
set -g monitor-activity on
set -g visual-activity off

# Terminal integration
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"

# Status line
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=default"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left-style "bg=default,fg=default,bold"
set -g status-right-style "bg=default,fg=default"
set -g window-status-separator ""
set -g window-status-style "bg=default,fg=default,dim"
set -g window-status-current-style "bg=default,fg=default,bold"
set -g window-status-activity-style "bg=default,fg=default,bold"
set -g status-left "#{?client_prefix,#[reverse],}   #S  #[default,dim]| "
set -g status-right "#{b:pane_current_path} #[default,dim]| #[default]#{window_panes} panes #[default,dim]| #[default]%d #[default,dim]| #[default]%H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Windows
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind w choose-tree -Zw
bind , command-prompt -I "#W" "rename-window '%%'"
bind . command-prompt -I "#I" "move-window -t '%%'"
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Pane creation/removal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# Pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Pane resize
bind -r H resize-pane -L 15
bind -r J resize-pane -D 15
bind -r K resize-pane -U 15
bind -r L resize-pane -R 15

# Copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
